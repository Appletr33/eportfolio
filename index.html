<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ePortfolio — A student portfolio">
  <title>ePortfolio</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1117;
      color: #d6e1df;
      font: 16px/1.5 Consolas, Monaco, monospace;
    }

    .boot-root__status {
      opacity: 0.8;
      letter-spacing: 0.04em;
    }
  </style>
</head>

<body data-page="home">
  <div id="boot-root" class="boot-root">
    <p class="boot-root__status">Loading portfolio...</p>
  </div>
  <script>
    window.__SITE_VERSION__ = '2026-03-15-1';

    (async () => {
      const version = window.__SITE_VERSION__;
      const root = document.getElementById('boot-root');

      const loadScript = (src) => new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = `${src}?v=${version}`;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.body.appendChild(script);
      });

      try {
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = `styles.css?v=${version}`;
        document.head.appendChild(stylesheet);

        const response = await fetch(`home.html?v=${version}`, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Failed to load home.html (${response.status})`);
        }

        root.outerHTML = await response.text();
        await loadScript('matrix.js');
        await loadScript('script.js');
      } catch (error) {
        console.error('Home bootstrap failed.', error);
        root.innerHTML = '<p class="boot-root__status">Unable to load the portfolio right now. Please refresh.</p>';
      }
    })();
  </script>
</body>

</html>
